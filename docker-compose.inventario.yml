version: '3.8'

services:
  inventario_api:
    build: 
      context: ./backend
    container_name: inventario_api
    environment:
      - DB_HOST=db_main
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=tienda_db
      - RABBITMQ_HOST=message_broker
      - REDIS_HOST=redis_session
      - USER_SESSION_EXPIRATION_TIME=3600
      - MAX_DB_POOL_CONNS=5
      - MAX_CACHE_POOL_CONNS=10
    ports:
      - "5010:5010" 
    volumes:
      - ./backend:/app 
    command: python -u -m mod_inventario.api
    networks:
      - red_tienda

  inventario_worker:
    build: 
      context: ./backend
    container_name: inventario_worker
    environment:
      - DB_HOST=db_main
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=tienda_db
      - RABBITMQ_HOST=message_broker
      - REDIS_HOST=redis_session
      - USER_SESSION_EXPIRATION_TIME=3600
      - MAX_DB_POOL_CONNS=5
      - MAX_CACHE_POOL_CONNS=10
    volumes:
      - ./backend:/app 
    command: python -u -m mod_inventario.consumer
    networks:
      - red_tienda

networks:
  red_tienda:
    external: true